# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

name: build
on: [ push, pull_request ]

jobs:
  test-action:
    name: Test action
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v5

      - name: Get Changelog Information
        uses: ./
        id: yaclog-show
        with:
          changelog-path: 'tests/Test-Changelog.md'

      - name: Get Changelog Information (Unreleased)
        uses: ./
        id: yaclog-show-unreleased
        with:
          changelog-path: 'tests/Test-Changelog-Unreleased.md'

      - name: Copy Body File
        run:
          cp ${{ steps.yaclog-show.outputs.body-file }} body.md

      - name: Fail
        if: >
          !(
          steps.yaclog-show.outputs.name == '0.13.0 "Aquarius"' &&
          steps.yaclog-show.outputs.header == '## 0.13.0 "Aquarius" - 1970-04-11 [YANKED]' &&
          steps.yaclog-show.outputs.version == '0.13.0' &&
          steps.yaclog-show-unreleased.outputs.version == '0.13.1' &&
          endsWith(steps.yaclog-show.outputs.changelog, 'tests/Test-Changelog.md') &&
          hashFiles('body.md') == 'ad49b5c946b7d361db1c3dacc73de4f6222cca6272aab426786de168eede702b'
          )
        run: |
          echo "Action self-test failed!"
          echo "yaclog-show:\n ${{ toJSON(steps.yaclog-show.outputs) }}"
          echo "yaclog-show-unreleased:\n${{ toJSON(steps.yaclog-show.outputs) }}"
          echo "${{ hashFiles('body.md') }}"
          false

  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v5

      - name: Set up Python
        uses: https://code.forgejo.org/actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up project
        run: |
          pip install -e .[dev]

      - name: Lint
        run: just lint

      - name: Run unit tests
        run: just test --verbose

  publish:
    name: Build and Publish
    needs:
      - test
      - test-action
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: https://code.forgejo.org/actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Get Changelog Information
        id: yaclog-show
        uses: ./ # self-hosting!

      - name: Build
        run: |
          pipx run build

      - name: Upload artifacts
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: python-distribution
          path: dist/
          compression-level: 0 # already compressed

      - name: Create release
        uses: https://code.forgejo.org/actions/forgejo-release@v2.11.1
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        with:
          direction: upload
          token: ${{ secrets.FORGEJO_TOKEN }}
          release-dir: dist
          title: ${{ steps.yaclog-show.outputs.name }}
          release-notes-file: ${{ steps.yaclog-show.outputs.body-file }}

      - name: Upload to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        run: pipx run twine upload --skip-existing dist/*
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Upload to Forgejo
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        run: pipx run twine upload dist/*
        env:
          TWINE_USERNAME: ${{ forge.repository_owner }}
          TWINE_PASSWORD: ${{ secrets.FORGEJO_DEPLOY_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ forge.server_url }}/api/packages/${{ forge.repository_owner }}/pypi